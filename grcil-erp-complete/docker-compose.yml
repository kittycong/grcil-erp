version: '3.8'

services:
  # Flask 백엔드
  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: development
      FLASK_APP: app.py
      DATABASE_URL: sqlite:///grcil_erp.db
      DEBUG: "True"
    volumes:
      - .:/app
      - ${HOME}/.grcil_erp:/root/.grcil_erp
    command: flask run --host=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Nginx 프로덕션 (선택)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./grcil_erp_dashboard.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      - api

  # PostgreSQL (향후 사용)
  # postgres:
  #   image: postgres:14-alpine
  #   environment:
  #     POSTGRES_DB: grcil_erp
  #     POSTGRES_USER: grcil
  #     POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"

volumes:
