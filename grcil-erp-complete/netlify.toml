[build]
  # 정적 대시보드 배포
  command = "mkdir -p public && cp grcil_erp_dashboard.html public/index.html"
  # 배포할 디렉토리
  publish = "public"
  # 함수 디렉토리 (Netlify Functions)
  functions = "netlify/functions"

[build.environment]
  # 환경 변수
  PYTHON_VERSION = "3.9"
  NODE_VERSION = "18"

# Redirect 규칙
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 헤더 설정 (보안)
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# 캐시 설정
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
